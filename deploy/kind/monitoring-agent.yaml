# Monitoring agent pod deployment for Kind cluster
# Traffic direction: monitoring → diagnostic only (per trust boundary)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-agent
  labels:
    app: monitoring-agent
    environment: dev-test-only
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-agent
  template:
    metadata:
      labels:
        app: monitoring-agent
        environment: dev-test-only
    spec:
      containers:
        - name: monitoring-agent
          image: localhost/monitoring-agent:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_URL
              value: "http://ollama:11434/v1"
            - name: AGENT_MODEL
              value: "qwen3.6:latest"
            - name: DISPATCH_ENDPOINT
              value: "http://diagnostic-agent:8080"
            - name: CLUSTER_SCENARIO
              value: "bad_deploy"
            - name: MONITOR_INTERVAL
              value: "60"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-agent
  labels:
    app: monitoring-agent
    environment: dev-test-only
spec:
  selector:
    app: monitoring-agent
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
