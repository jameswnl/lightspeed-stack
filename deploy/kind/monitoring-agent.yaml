apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-agent
  labels:
    app: monitoring-agent
    environment: cloud-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-agent
  template:
    metadata:
      labels:
        app: monitoring-agent
        environment: cloud-agents
    spec:
      containers:
        - name: agent
          image: docker.io/library/agent-runtime:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_URL
              value: "https://api.openai.com/v1"
            - name: AGENT_MODEL
              value: "gpt-4"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-key
                  key: OPENAI_API_KEY
                  optional: true
            - name: AGENT_BOOTSTRAP_MODULE
              value: "monitoring_tools"
            - name: AGENT_BOOTSTRAP_FUNCTION
              value: "init_scenario"
            - name: AGENT_BOOTSTRAP_ARGS
              value: "bad_deploy"
          volumeMounts:
            - name: agent-config
              mountPath: /app/agent.yaml
              subPath: agent.yaml
              readOnly: true
            - name: agent-config
              mountPath: /app/registry.yaml
              subPath: registry.yaml
              readOnly: true
            - name: agent-tools
              mountPath: /app/tools/monitoring_tools.py
              subPath: monitoring_tools.py
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: agent-config
          configMap:
            name: monitoring-agent-config
        - name: agent-tools
          configMap:
            name: monitoring-agent-tools
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-agent
  labels:
    app: monitoring-agent
    environment: cloud-agents
spec:
  selector:
    app: monitoring-agent
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
