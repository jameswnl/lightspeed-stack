# ServiceAccounts and RBAC for cloud agents
# Each agent type gets a scoped ServiceAccount.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: diagnostic-agent
  labels:
    app: diagnostic-agent
    environment: cloud-agents
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-agent
  labels:
    app: monitoring-agent
    environment: cloud-agents
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow-runner
  labels:
    app: workflow-runner
    environment: cloud-agents
---
# Workflow runner needs permission to create Jobs (for on-demand spawning in Phase 4b)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow-runner-role
  labels:
    environment: cloud-agents
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "delete", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow-runner-binding
  labels:
    environment: cloud-agents
subjects:
  - kind: ServiceAccount
    name: workflow-runner
roleRef:
  kind: Role
  name: workflow-runner-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workflow-runner-tokenreview
  labels:
    environment: cloud-agents
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workflow-runner-tokenreview-binding
  labels:
    environment: cloud-agents
subjects:
  - kind: ServiceAccount
    name: workflow-runner
    namespace: default
roleRef:
  kind: ClusterRole
  name: workflow-runner-tokenreview
  apiGroup: rbac.authorization.k8s.io
