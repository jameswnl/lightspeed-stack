# Temporal Lite (dev mode with SQLite) for Kind cluster.
# No external database required.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-server
  labels:
    app: temporal-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-server
  template:
    metadata:
      labels:
        app: temporal-server
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:latest
          ports:
            - containerPort: 7233
          env:
            - name: DB
              value: sqlite
            - name: SKIP_DB_CREATE
              value: "false"
          readinessProbe:
            exec:
              command: ["temporal", "operator", "namespace", "list"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
spec:
  selector:
    app: temporal-server
  ports:
    - port: 7233
      targetPort: 7233
