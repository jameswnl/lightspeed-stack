# Podman compose for cloud agents Phase 1a
#
# Usage:
#   podman compose -f deploy/podman/docker-compose.cloud-agents.yaml up -d
#   curl http://localhost:8081/healthz
#   podman compose -f deploy/podman/docker-compose.cloud-agents.yaml down

services:
  diagnostic-agent:
    build:
      context: ../..
      dockerfile: deploy/diagnostic-agent/Containerfile
    container_name: diagnostic-agent
    ports:
      - "8081:8080"
    environment:
      - OLLAMA_URL=http://host.containers.internal:11434/v1
      - AGENT_MODEL=qwen3.6:latest
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8080/healthz'); exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
