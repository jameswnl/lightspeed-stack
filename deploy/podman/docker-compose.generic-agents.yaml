# Podman compose using the generic agent-runtime image
# Both agents run on the same image with different mounted configs.
#
# Usage:
#   podman compose -f deploy/podman/docker-compose.generic-agents.yaml up -d
#   curl http://localhost:8081/healthz   # diagnostic-agent
#   curl http://localhost:8082/healthz   # monitoring-agent

services:
  diagnostic-agent:
    image: agent-runtime:latest
    container_name: diagnostic-agent
    ports:
      - "8081:8080"
    volumes:
      - ../../examples/agents/definitions/diagnostic-agent.yaml:/app/agent.yaml:ro
      - ../../examples/agents/tools/diagnostic_tools.py:/app/tools/diagnostic_tools.py:ro
      - ../../examples/agents/registry.yaml:/app/registry.yaml:ro
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.containers.internal:11434/v1}
      - AGENT_MODEL=${AGENT_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-needed}
    restart: unless-stopped

  monitoring-agent:
    image: agent-runtime:latest
    container_name: monitoring-agent
    ports:
      - "8082:8080"
    volumes:
      - ../../examples/agents/definitions/monitoring-agent.yaml:/app/agent.yaml:ro
      - ../../examples/agents/tools/monitoring_tools.py:/app/tools/monitoring_tools.py:ro
      - ../../examples/agents/registry.yaml:/app/registry.yaml:ro
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.containers.internal:11434/v1}
      - AGENT_MODEL=${AGENT_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-needed}
      - AGENT_BOOTSTRAP_MODULE=monitoring_tools
      - AGENT_BOOTSTRAP_FUNCTION=init_scenario
      - AGENT_BOOTSTRAP_ARGS=bad_deploy
    depends_on:
      - diagnostic-agent
    restart: unless-stopped
