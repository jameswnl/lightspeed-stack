<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Agents Framework — Architecture & Workflow Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; overflow-x: hidden; }
h1 { text-align: center; padding: 24px 0 8px; font-size: 1.6em; color: #58a6ff; }
h2 { text-align: center; padding: 8px 0 16px; font-size: 1em; color: #8b949e; font-weight: normal; }
.scene { max-width: 1100px; margin: 0 auto; padding: 20px; }
svg { width: 100%; height: auto; }

.comp { cursor: default; }
.comp rect { rx: 8; ry: 8; stroke-width: 2; transition: filter 0.3s; }
.comp:hover rect { filter: brightness(1.3); }
.comp-label { font-size: 13px; font-weight: 600; fill: #f0f6fc; }
.comp-desc { font-size: 10px; fill: #8b949e; }

.boundary { fill: none; stroke-dasharray: 8 4; stroke-width: 1.5; rx: 12; ry: 12; }
.boundary-label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }

.flow-line { stroke-dasharray: 6 4; stroke-width: 2; opacity: 0; }
.flow-line.active { opacity: 1; animation: dash 0.6s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -10; } }

.step-box { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 6; ry: 6; }
.step-text { font-size: 11px; fill: #c9d1d9; }
.step-num { font-size: 12px; fill: #58a6ff; font-weight: 700; }

@keyframes glow { 0%,100% { filter: drop-shadow(0 0 4px #238636); } 50% { filter: drop-shadow(0 0 12px #3fb950); } }
.ephemeral rect { animation: glow 1.5s ease-in-out infinite; }

.controls { text-align: center; padding: 16px; }
.controls button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 0 4px; transition: background 0.2s; }
.controls button:hover { background: #30363d; }
.controls button.primary { background: #238636; border-color: #238636; color: #fff; }
.controls button.primary:hover { background: #2ea043; }
.controls button:disabled { opacity: 0.4; cursor: not-allowed; }

#log { max-width: 1100px; margin: 0 auto; padding: 0 20px 40px; }
#log-content { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; font-family: 'SFMono-Regular', monospace; font-size: 12px; line-height: 1.8; max-height: 300px; overflow-y: auto; }
.log-step { color: #58a6ff; }
.log-data { color: #3fb950; }
.log-warn { color: #d29922; }
</style>
</head>
<body>

<h1>Cloud Agents Framework</h1>
<h2>Architecture &amp; Workflow Animation</h2>

<div class="scene">
<svg viewBox="0 0 1060 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#21262d" stroke-width="0.5"/></pattern>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/></marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/></marker>
    <marker id="arrow-orange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d29922"/></marker>
  </defs>
  <rect width="1060" height="640" fill="url(#grid)"/>

  <!-- ====== DEPLOYMENT BOUNDARIES ====== -->

  <!-- Server / Cluster boundary -->
  <rect class="boundary" x="155" y="95" width="560" height="480" stroke="#30363d"/>
  <text x="175" y="115" class="boundary-label" fill="#484f58">Server Deployment (K8s / Podman)</text>

  <!-- Platform framework boundary -->
  <rect class="boundary" x="168" y="130" width="185" height="430" stroke="#58a6ff" opacity="0.4"/>
  <text x="178" y="148" class="boundary-label" fill="#58a6ff" opacity="0.6">Platform Framework</text>

  <!-- Ephemeral pods boundary -->
  <rect class="boundary" x="420" y="155" width="280" height="310" stroke="#238636" opacity="0.4"/>
  <text x="435" y="173" class="boundary-label" fill="#3fb950" opacity="0.6">Ephemeral Pods (per step)</text>

  <!-- External boundary -->
  <rect class="boundary" x="680" y="95" width="200" height="480" stroke="#a371f7" opacity="0.3"/>
  <text x="695" y="115" class="boundary-label" fill="#a371f7" opacity="0.5">External Services</text>

  <!-- ====== COMPONENTS ====== -->

  <!-- User -->
  <g class="comp" id="c-user">
    <rect x="20" y="270" width="100" height="60" fill="#1f2937" stroke="#6366f1"/>
    <text x="70" y="295" text-anchor="middle" class="comp-label">User / API</text>
    <text x="70" y="310" text-anchor="middle" class="comp-desc">POST /v1/workflows/run</text>
  </g>

  <!-- Workflow Runner -->
  <g class="comp" id="c-workflow">
    <rect x="180" y="230" width="160" height="100" fill="#1c2333" stroke="#58a6ff"/>
    <text x="260" y="260" text-anchor="middle" class="comp-label">Workflow Runner</text>
    <text x="260" y="278" text-anchor="middle" class="comp-desc">WorkflowExecutor</text>
    <text x="260" y="292" text-anchor="middle" class="comp-desc">Reads workflow.yaml</text>
    <text x="260" y="306" text-anchor="middle" class="comp-desc">Orchestrates steps</text>
    <text x="260" y="320" text-anchor="middle" class="comp-desc">Emits WorkflowEvents</text>
  </g>

  <!-- Spawner -->
  <g class="comp" id="c-spawner">
    <rect x="180" y="390" width="160" height="70" fill="#1c2333" stroke="#d29922"/>
    <text x="260" y="418" text-anchor="middle" class="comp-label">Spawner</text>
    <text x="260" y="435" text-anchor="middle" class="comp-desc">KubernetesSpawner</text>
    <text x="260" y="448" text-anchor="middle" class="comp-desc">PodmanSpawner</text>
  </g>

  <!-- Agent Registry -->
  <g class="comp" id="c-registry">
    <rect x="180" y="160" width="160" height="45" fill="#1c2333" stroke="#8b949e"/>
    <text x="260" y="180" text-anchor="middle" class="comp-label">Agent Registry</text>
    <text x="260" y="196" text-anchor="middle" class="comp-desc">name → endpoint mapping</text>
  </g>

  <!-- Persistence -->
  <g class="comp" id="c-persist">
    <rect x="180" y="510" width="160" height="45" fill="#1c2333" stroke="#79c0ff"/>
    <text x="260" y="530" text-anchor="middle" class="comp-label">Persistence</text>
    <text x="260" y="546" text-anchor="middle" class="comp-desc">PostgreSQL / InMemory</text>
  </g>

  <!-- Ephemeral Pod 1 (diagnostic) -->
  <g class="comp ephemeral" id="c-diag-pod" style="opacity:0">
    <rect x="440" y="190" width="180" height="120" fill="#0d2818" stroke="#238636"/>
    <text x="530" y="215" text-anchor="middle" class="comp-label" fill="#3fb950">Ephemeral Pod</text>
    <text x="530" y="232" text-anchor="middle" class="comp-desc">diagnostic-agent</text>
    <text x="530" y="250" text-anchor="middle" class="comp-desc" fill="#8b949e">── Agent Runtime ──</text>
    <text x="530" y="266" text-anchor="middle" class="comp-desc">Pydantic AI Agent</text>
    <text x="530" y="280" text-anchor="middle" class="comp-desc">Tools: list_hosts, check_host</text>
    <text x="530" y="294" text-anchor="middle" class="comp-desc">run_remediation</text>
  </g>

  <!-- Ephemeral Pod 2 (monitoring) -->
  <g class="comp ephemeral" id="c-mon-pod" style="opacity:0">
    <rect x="440" y="340" width="180" height="100" fill="#0d2818" stroke="#238636"/>
    <text x="530" y="365" text-anchor="middle" class="comp-label" fill="#3fb950">Ephemeral Pod</text>
    <text x="530" y="382" text-anchor="middle" class="comp-desc">monitoring-agent</text>
    <text x="530" y="400" text-anchor="middle" class="comp-desc" fill="#8b949e">── Agent Runtime ──</text>
    <text x="530" y="416" text-anchor="middle" class="comp-desc">Tools: get_cluster_summary</text>
    <text x="530" y="430" text-anchor="middle" class="comp-desc">Output: MonitoringResult</text>
  </g>

  <!-- Approval Channel -->
  <g class="comp" id="c-approval">
    <rect x="440" y="500" width="180" height="50" fill="#2d2000" stroke="#d29922"/>
    <text x="530" y="522" text-anchor="middle" class="comp-label" fill="#e3b341">Approval Channel</text>
    <text x="530" y="540" text-anchor="middle" class="comp-desc">Slack / Webhook / Conversational</text>
  </g>

  <!-- LLM -->
  <g class="comp" id="c-llm">
    <rect x="720" y="230" width="130" height="70" fill="#2d1b4e" stroke="#a371f7"/>
    <text x="785" y="260" text-anchor="middle" class="comp-label" fill="#d2a8ff">LLM (OpenAI)</text>
    <text x="785" y="278" text-anchor="middle" class="comp-desc">gpt-4 / pydantic-ai</text>
    <text x="785" y="292" text-anchor="middle" class="comp-desc">Tool calling + structured output</text>
  </g>

  <!-- Metrics -->
  <g class="comp" id="c-metrics">
    <rect x="720" y="350" width="130" height="55" fill="#1c2333" stroke="#8b949e"/>
    <text x="785" y="373" text-anchor="middle" class="comp-label">Observability</text>
    <text x="785" y="391" text-anchor="middle" class="comp-desc">Prometheus + OTel</text>
  </g>

  <!-- Human -->
  <g class="comp" id="c-human">
    <rect x="720" y="460" width="130" height="55" fill="#1f2937" stroke="#6366f1"/>
    <text x="785" y="483" text-anchor="middle" class="comp-label">Human Approver</text>
    <text x="785" y="501" text-anchor="middle" class="comp-desc">SRE / Operator</text>
  </g>

  <!-- ====== FLOW LINES ====== -->
  <line id="f-user-wf" class="flow-line" x1="120" y1="300" x2="175" y2="280" stroke="#58a6ff" marker-end="url(#arrow)"/>
  <line id="f-wf-spawner" class="flow-line" x1="260" y1="335" x2="260" y2="385" stroke="#d29922" marker-end="url(#arrow-orange)"/>
  <line id="f-spawner-diag" class="flow-line" x1="340" y1="410" x2="435" y2="270" stroke="#3fb950" marker-end="url(#arrow-green)"/>
  <line id="f-spawner-mon" class="flow-line" x1="340" y1="425" x2="435" y2="390" stroke="#3fb950" marker-end="url(#arrow-green)"/>
  <line id="f-diag-llm" class="flow-line" x1="620" y1="250" x2="715" y2="260" stroke="#a371f7" marker-end="url(#arrow)"/>
  <line id="f-mon-llm" class="flow-line" x1="620" y1="380" x2="715" y2="280" stroke="#a371f7" marker-end="url(#arrow)"/>
  <line id="f-diag-wf" class="flow-line" x1="440" y1="260" x2="345" y2="270" stroke="#3fb950" marker-end="url(#arrow-green)"/>
  <line id="f-mon-wf" class="flow-line" x1="440" y1="390" x2="345" y2="300" stroke="#3fb950" marker-end="url(#arrow-green)"/>
  <line id="f-wf-persist" class="flow-line" x1="260" y1="335" x2="260" y2="505" stroke="#79c0ff" marker-end="url(#arrow)"/>
  <line id="f-wf-approval" class="flow-line" x1="340" y1="310" x2="435" y2="520" stroke="#d29922" marker-end="url(#arrow-orange)"/>
  <line id="f-approval-human" class="flow-line" x1="620" y1="525" x2="715" y2="487" stroke="#d29922" marker-end="url(#arrow-orange)"/>
  <line id="f-human-wf" class="flow-line" x1="720" y1="490" x2="345" y2="310" stroke="#3fb950" marker-end="url(#arrow-green)"/>
  <line id="f-wf-registry" class="flow-line" x1="260" y1="230" x2="260" y2="210" stroke="#8b949e" marker-end="url(#arrow)"/>

  <!-- ====== STEP INDICATOR ====== -->
  <g id="step-indicator" style="opacity:0">
    <rect class="step-box" x="20" y="30" width="1020" height="50"/>
    <text id="step-num" class="step-num" x="40" y="60"></text>
    <text id="step-text" class="step-text" x="80" y="60"></text>
  </g>
</svg>
</div>

<div class="controls">
  <button class="primary" id="btn-play" onclick="startAutoPlay()">Auto Play</button>
  <button class="primary" id="btn-next" onclick="nextStep()">Next Step &rarr;</button>
  <button id="btn-reset" onclick="resetAnimation()">Reset</button>
  <span id="mode-label" style="color:#8b949e; font-size:13px; margin-left:12px;"></span>
</div>

<div id="log">
  <div id="log-content"></div>
</div>

<script>
const steps = [
  { num: '1/9', text: 'User triggers workflow: POST /v1/workflows/run → Workflow Runner', flows: ['f-user-wf'], duration: 2000, log: '<span class="log-step">→ POST /v1/workflows/run</span> {workflow: "diagnose-and-fix"}' },
  { num: '2/9', text: 'Executor reads workflow.yaml, resolves agents from registry', flows: ['f-wf-registry'], duration: 1500, log: '<span class="log-step">→ Load workflow</span> steps: [diagnose, approve, fix, verify]' },
  { num: '3/9', text: 'Step 1 (diagnose): Spawner creates ephemeral diagnostic-agent pod', flows: ['f-wf-spawner', 'f-spawner-diag'], show: ['c-diag-pod'], duration: 2500, log: '<span class="log-data">↑ Spawned</span> ephemeral pod: agent-diagnostic-agent-a1b2c3' },
  { num: '4/9', text: 'Diagnostic agent calls LLM → tools (list_hosts, check_host, run_remediation) → DiagnosticReport', flows: ['f-diag-llm'], duration: 3000, log: '<span class="log-data">⚙ Tools called:</span> list_hosts → check_host(web-02) → run_remediation(web-02, rollback_deploy:frontend)\n<span class="log-data">← DiagnosticReport</span> {cluster_healthy: true, actions_taken: 1, confidence: "high"}' },
  { num: '5/9', text: 'DiagnosticReport returned → ephemeral pod DESTROYED', flows: ['f-diag-wf'], hide: ['c-diag-pod'], duration: 2000, log: '<span class="log-data">↓ Destroyed</span> ephemeral pod: agent-diagnostic-agent-a1b2c3\n<span class="log-step">✓ Step "diagnose" completed</span>' },
  { num: '6/9', text: 'Step 2 (approve): Workflow PAUSES → notification sent to Slack → human reviews + approves', flows: ['f-wf-approval', 'f-approval-human', 'f-human-wf'], duration: 3500, log: '<span class="log-warn">⏸ Workflow paused</span> at step "approve-fix"\n<span class="log-warn">→ Slack notification</span> sent to #sre-approvals\n<span class="log-data">← Human approved</span> by sre-lead@redhat.com (took 45s)' },
  { num: '7/9', text: 'Step 3 (fix): Spawner creates ephemeral pod → agent remediates', flows: ['f-wf-spawner', 'f-spawner-diag'], show: ['c-diag-pod'], duration: 2500, log: '<span class="log-data">↑ Spawned</span> ephemeral pod: agent-diagnostic-agent-d4e5f6\n<span class="log-data">⚙ Tools:</span> run_remediation(web-02, restart_service:app)' },
  { num: '7b', text: 'Fix result returned → ephemeral pod DESTROYED', flows: ['f-diag-wf'], hide: ['c-diag-pod'], duration: 1500, log: '<span class="log-data">↓ Destroyed</span> ephemeral pod\n<span class="log-step">✓ Step "fix" completed</span>' },
  { num: '8/9', text: 'Step 4 (verify): Monitoring agent checks cluster health independently', flows: ['f-wf-spawner', 'f-spawner-mon'], show: ['c-mon-pod'], duration: 2500, log: '<span class="log-data">↑ Spawned</span> ephemeral pod: agent-monitoring-agent-g7h8i9\n<span class="log-data">⚙ Tools:</span> get_cluster_summary → all hosts healthy' },
  { num: '8b', text: 'MonitoringResult returned → ephemeral pod DESTROYED', flows: ['f-mon-wf', 'f-mon-llm'], hide: ['c-mon-pod'], duration: 1500, log: '<span class="log-data">← MonitoringResult</span> {cluster_healthy: true, alerts: []}\n<span class="log-data">↓ Destroyed</span> ephemeral pod\n<span class="log-step">✓ Step "verify" completed</span>' },
  { num: '9/9', text: 'Workflow COMPLETE → state persisted to PostgreSQL', flows: ['f-wf-persist'], duration: 2000, log: '<span class="log-step">✓ Workflow "diagnose-and-fix" completed</span>\n<span class="log-data">→ State persisted</span> to PostgreSQL (workflow_id: 57173706...)' },
];

let animTimer = null;
let currentIdx = 0;
let mode = 'idle'; // idle | auto | manual

function clearFlows() {
  document.querySelectorAll('.flow-line').forEach(l => l.classList.remove('active'));
}

function showStep(idx) {
  if (idx >= steps.length) {
    clearFlows();
    document.getElementById('mode-label').textContent = 'Done';
    document.getElementById('btn-next').disabled = true;
    return;
  }
  const s = steps[idx];
  const ind = document.getElementById('step-indicator');
  ind.style.opacity = 1;
  document.getElementById('step-num').textContent = `Step ${s.num}`;
  document.getElementById('step-text').textContent = s.text;

  clearFlows();
  (s.flows || []).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
  });
  (s.show || []).forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.opacity = 1; el.style.transition = 'opacity 0.5s'; }
  });
  (s.hide || []).forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.opacity = 0; el.style.transition = 'opacity 0.8s'; }
  });

  const logEl = document.getElementById('log-content');
  logEl.innerHTML += s.log + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

function startAutoPlay() {
  resetAnimation();
  mode = 'auto';
  currentIdx = 0;
  document.getElementById('mode-label').textContent = 'Auto playing...';
  document.getElementById('btn-next').disabled = true;
  function next() {
    if (currentIdx >= steps.length || mode !== 'auto') {
      if (currentIdx >= steps.length) {
        clearFlows();
        document.getElementById('mode-label').textContent = 'Done';
      }
      return;
    }
    showStep(currentIdx);
    currentIdx++;
    animTimer = setTimeout(next, steps[currentIdx - 1].duration);
  }
  next();
}

function nextStep() {
  if (mode === 'auto') return;
  if (mode === 'idle') {
    resetAnimation();
    mode = 'manual';
    document.getElementById('mode-label').textContent = 'Click "Next Step" to advance';
  }
  if (currentIdx >= steps.length) return;
  showStep(currentIdx);
  currentIdx++;
  if (currentIdx >= steps.length) {
    document.getElementById('mode-label').textContent = 'Done';
    document.getElementById('btn-next').disabled = true;
  } else {
    document.getElementById('mode-label').textContent = `Step ${currentIdx + 1} of ${steps.length} — click "Next Step" to continue`;
  }
}

function resetAnimation() {
  if (animTimer) clearTimeout(animTimer);
  mode = 'idle';
  currentIdx = 0;
  clearFlows();
  document.getElementById('step-indicator').style.opacity = 0;
  document.getElementById('c-diag-pod').style.opacity = 0;
  document.getElementById('c-mon-pod').style.opacity = 0;
  document.getElementById('log-content').innerHTML = '';
  document.getElementById('mode-label').textContent = '';
  document.getElementById('btn-next').disabled = false;
}
</script>
</body>
</html>
