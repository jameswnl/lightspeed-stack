<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Agents — Diagnostic Workflow Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }
h1 { text-align: center; padding: 20px 0 4px; font-size: 1.5em; color: #58a6ff; }
h2 { text-align: center; padding: 4px 0 12px; font-size: 0.95em; color: #8b949e; font-weight: normal; }
.scene { max-width: 1200px; margin: 0 auto; padding: 10px 20px; }
svg { width: 100%; height: auto; display: block; }

.comp rect { rx: 8; ry: 8; stroke-width: 2; transition: filter 0.3s, opacity 0.5s; }
.comp:hover rect { filter: brightness(1.2); }
.lbl { font-size: 12px; font-weight: 600; fill: #f0f6fc; }
.desc { font-size: 9.5px; fill: #8b949e; }
.mount { font-size: 9px; fill: #d2a8ff; font-family: 'SFMono-Regular', monospace; }
.mount-hdr { font-size: 9.5px; fill: #a371f7; font-weight: 600; }
.step-label { font-size: 11px; fill: #58a6ff; font-weight: 700; }

.boundary { fill: none; stroke-dasharray: 7 4; stroke-width: 1.4; rx: 10; ry: 10; }
.blbl { font-size: 10px; font-weight: 600; letter-spacing: 0.4px; }

.flow { stroke-dasharray: 6 4; stroke-width: 2; opacity: 0; transition: opacity 0.3s; }
.flow.on { opacity: 1; animation: dash 0.5s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -10; } }

@keyframes glow { 0%,100% { filter: drop-shadow(0 0 3px #238636); } 50% { filter: drop-shadow(0 0 10px #3fb950); } }
.eph rect { animation: glow 1.4s ease-in-out infinite; }

.step-bar { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 6; }
.step-n { font-size: 12px; fill: #58a6ff; font-weight: 700; }
.step-t { font-size: 11px; fill: #c9d1d9; }

.controls { text-align: center; padding: 12px; }
.controls button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 7px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; margin: 0 3px; }
.controls button:hover { background: #30363d; }
.controls button.go { background: #238636; border-color: #238636; color: #fff; }
.controls button.go:hover { background: #2ea043; }
.controls button:disabled { opacity: 0.35; cursor: default; }
#info { color: #8b949e; font-size: 12px; margin-left: 10px; }

#log { max-width: 1200px; margin: 0 auto; padding: 0 20px 30px; }
#lc { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px; font-family: 'SFMono-Regular', monospace; font-size: 11.5px; line-height: 1.7; max-height: 260px; overflow-y: auto; white-space: pre-wrap; }
.ls { color: #58a6ff; } .ld { color: #3fb950; } .lw { color: #d29922; }
</style>
</head>
<body>
<h1>Diagnostic Workflow — Step-by-Step</h1>
<h2>diagnose → approve → fix → verify &nbsp;(all steps use diagnostic-agent, each in its own ephemeral pod)</h2>

<div class="scene">
<svg viewBox="0 0 1140 580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="#21262d" stroke-width="0.5"/></pattern>
  <marker id="a1" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/></marker>
  <marker id="a2" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3fb950"/></marker>
  <marker id="a3" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#d29922"/></marker>
  <marker id="a4" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a371f7"/></marker>
</defs>
<rect width="1140" height="580" fill="url(#g)"/>

<!-- ===== BOUNDARIES ===== -->
<rect class="boundary" x="130" y="75" width="640" height="470" stroke="#30363d"/>
<text x="148" y="93" class="blbl" fill="#484f58">K8s Cluster / Podman Host</text>

<rect class="boundary" x="145" y="108" width="200" height="420" stroke="#58a6ff" opacity="0.35"/>
<text x="155" y="125" class="blbl" fill="#58a6ff" opacity="0.55">Platform Framework</text>

<rect class="boundary" x="390" y="108" width="365" height="330" stroke="#238636" opacity="0.35"/>
<text x="405" y="125" class="blbl" fill="#3fb950" opacity="0.55">Ephemeral Pod (one per step)</text>

<rect class="boundary" x="800" y="75" width="200" height="470" stroke="#a371f7" opacity="0.25"/>
<text x="815" y="93" class="blbl" fill="#a371f7" opacity="0.45">External</text>

<!-- ===== STATIC COMPONENTS ===== -->

<g class="comp" id="c-user">
  <rect x="15" y="220" width="90" height="50" fill="#1f2937" stroke="#6366f1"/>
  <text x="60" y="243" text-anchor="middle" class="lbl">User</text>
  <text x="60" y="258" text-anchor="middle" class="desc">API caller</text>
</g>

<g class="comp" id="c-wf">
  <rect x="155" y="195" width="180" height="100" fill="#1c2333" stroke="#58a6ff"/>
  <text x="245" y="220" text-anchor="middle" class="lbl">Workflow Runner</text>
  <text x="245" y="236" text-anchor="middle" class="desc">WorkflowExecutor</text>
  <text x="245" y="250" text-anchor="middle" class="desc">workflow.yaml → steps</text>
  <text x="245" y="264" text-anchor="middle" class="desc">conditions, retry, events</text>
  <text x="245" y="278" text-anchor="middle" class="desc">RemoteAgentClient</text>
</g>

<g class="comp" id="c-sp">
  <rect x="155" y="340" width="180" height="60" fill="#1c2333" stroke="#d29922"/>
  <text x="245" y="365" text-anchor="middle" class="lbl">Spawner</text>
  <text x="245" y="381" text-anchor="middle" class="desc">K8s Jobs / Podman containers</text>
</g>

<g class="comp" id="c-reg">
  <rect x="155" y="135" width="180" height="40" fill="#1c2333" stroke="#8b949e"/>
  <text x="245" y="155" text-anchor="middle" class="lbl">Agent Registry</text>
  <text x="245" y="168" text-anchor="middle" class="desc">registry.yaml</text>
</g>

<g class="comp" id="c-db">
  <rect x="155" y="450" width="180" height="40" fill="#1c2333" stroke="#79c0ff"/>
  <text x="245" y="470" text-anchor="middle" class="lbl">Persistence</text>
  <text x="245" y="484" text-anchor="middle" class="desc">PostgreSQL / InMemory</text>
</g>

<g class="comp" id="c-appr">
  <rect x="420" y="470" width="180" height="45" fill="#2d2000" stroke="#d29922"/>
  <text x="510" y="491" text-anchor="middle" class="lbl" fill="#e3b341">Approval Channel</text>
  <text x="510" y="505" text-anchor="middle" class="desc">Slack / Webhook</text>
</g>

<g class="comp" id="c-llm">
  <rect x="830" y="195" width="140" height="65" fill="#2d1b4e" stroke="#a371f7"/>
  <text x="900" y="220" text-anchor="middle" class="lbl" fill="#d2a8ff">LLM</text>
  <text x="900" y="236" text-anchor="middle" class="desc">OpenAI gpt-4</text>
  <text x="900" y="250" text-anchor="middle" class="desc">pydantic-ai tool calling</text>
</g>

<g class="comp" id="c-obs">
  <rect x="830" y="310" width="140" height="50" fill="#1c2333" stroke="#8b949e"/>
  <text x="900" y="333" text-anchor="middle" class="lbl">Observability</text>
  <text x="900" y="349" text-anchor="middle" class="desc">Prometheus + OTel</text>
</g>

<g class="comp" id="c-human">
  <rect x="830" y="420" width="140" height="50" fill="#1f2937" stroke="#6366f1"/>
  <text x="900" y="443" text-anchor="middle" class="lbl">Human Approver</text>
  <text x="900" y="459" text-anchor="middle" class="desc">SRE / Operator</text>
</g>

<!-- ===== EPHEMERAL PODS ===== -->

<!-- Step: diagnose -->
<g class="comp eph" id="pod-diagnose" style="opacity:0">
  <rect x="410" y="135" width="230" height="170" fill="#0d2818" stroke="#238636"/>
  <rect x="415" y="139" width="85" height="18" rx="4" fill="#1a4731" stroke="none"/>
  <text x="457" y="152" text-anchor="middle" class="step-label">DIAGNOSE</text>
  <text x="525" y="168" text-anchor="middle" class="lbl" fill="#3fb950">diagnostic-agent-a1b2</text>
  <text x="525" y="183" text-anchor="middle" class="desc">── Agent Runtime (generic image) ──</text>
  <line x1="420" y1="192" x2="630" y2="192" stroke="#30363d" stroke-width="0.5"/>
  <text x="425" y="206" class="mount-hdr">Mounts:</text>
  <text x="435" y="220" class="mount">/app/agent.yaml ← ConfigMap</text>
  <text x="435" y="234" class="mount">/app/tools/diagnostic_tools.py ← ConfigMap</text>
  <text x="435" y="248" class="mount">/app/registry.yaml ← ConfigMap</text>
  <text x="435" y="262" class="mount">/app/skills/ ← Volume (optional)</text>
  <line x1="420" y1="270" x2="630" y2="270" stroke="#30363d" stroke-width="0.5"/>
  <text x="425" y="284" class="desc">Tools: list_hosts, check_host, get_alerts, get_recent_deploys</text>
  <text x="425" y="297" class="desc">Output: DiagnosticReport {summary, issues_found, confidence}</text>
</g>

<!-- Step: fix -->
<g class="comp eph" id="pod-fix" style="opacity:0">
  <rect x="410" y="135" width="230" height="170" fill="#0d2818" stroke="#238636"/>
  <rect x="415" y="139" width="45" height="18" rx="4" fill="#1a4731" stroke="none"/>
  <text x="437" y="152" text-anchor="middle" class="step-label">FIX</text>
  <text x="525" y="168" text-anchor="middle" class="lbl" fill="#3fb950">diagnostic-agent-d4e5</text>
  <text x="525" y="183" text-anchor="middle" class="desc">── Agent Runtime (same image, fresh pod) ──</text>
  <line x1="420" y1="192" x2="630" y2="192" stroke="#30363d" stroke-width="0.5"/>
  <text x="425" y="206" class="mount-hdr">Mounts:</text>
  <text x="435" y="220" class="mount">/app/agent.yaml ← ConfigMap</text>
  <text x="435" y="234" class="mount">/app/tools/diagnostic_tools.py ← ConfigMap</text>
  <text x="435" y="248" class="mount">/app/registry.yaml ← ConfigMap</text>
  <text x="435" y="262" class="mount">/app/skills/ ← Volume (optional)</text>
  <line x1="420" y1="270" x2="630" y2="270" stroke="#30363d" stroke-width="0.5"/>
  <text x="425" y="284" class="desc">Tools: run_remediation (rollback_deploy, restart_service)</text>
  <text x="425" y="297" class="desc">Output: DiagnosticReport {actions_taken, cluster_healthy}</text>
</g>

<!-- Step: verify -->
<g class="comp eph" id="pod-verify" style="opacity:0">
  <rect x="410" y="135" width="230" height="170" fill="#0d2818" stroke="#238636"/>
  <rect x="415" y="139" width="65" height="18" rx="4" fill="#1a4731" stroke="none"/>
  <text x="447" y="152" text-anchor="middle" class="step-label">VERIFY</text>
  <text x="525" y="168" text-anchor="middle" class="lbl" fill="#3fb950">diagnostic-agent-g7h8</text>
  <text x="525" y="183" text-anchor="middle" class="desc">── Agent Runtime (same image, fresh pod) ──</text>
  <line x1="420" y1="192" x2="630" y2="192" stroke="#30363d" stroke-width="0.5"/>
  <text x="425" y="206" class="mount-hdr">Mounts:</text>
  <text x="435" y="220" class="mount">/app/agent.yaml ← ConfigMap</text>
  <text x="435" y="234" class="mount">/app/tools/diagnostic_tools.py ← ConfigMap</text>
  <text x="435" y="248" class="mount">/app/registry.yaml ← ConfigMap</text>
  <text x="435" y="262" class="mount">/app/skills/ ← Volume (optional)</text>
  <line x1="420" y1="270" x2="630" y2="270" stroke="#30363d" stroke-width="0.5"/>
  <text x="425" y="284" class="desc">Tools: list_hosts, check_host (verify fix worked)</text>
  <text x="425" y="297" class="desc">Output: DiagnosticReport {cluster_healthy, remaining_issues}</text>
</g>

<!-- ===== FLOW LINES ===== -->
<line id="f1" class="flow" x1="105" y1="245" x2="150" y2="245" stroke="#58a6ff" marker-end="url(#a1)"/>
<line id="f2" class="flow" x1="245" y1="195" x2="245" y2="178" stroke="#8b949e" marker-end="url(#a1)"/>
<line id="f3" class="flow" x1="245" y1="300" x2="245" y2="335" stroke="#d29922" marker-end="url(#a3)"/>
<line id="f4" class="flow" x1="335" y1="360" x2="405" y2="240" stroke="#3fb950" marker-end="url(#a2)"/>
<line id="f5" class="flow" x1="640" y1="220" x2="825" y2="220" stroke="#a371f7" marker-end="url(#a4)"/>
<line id="f6" class="flow" x1="410" y1="240" x2="340" y2="250" stroke="#3fb950" marker-end="url(#a2)"/>
<line id="f7" class="flow" x1="245" y1="300" x2="245" y2="445" stroke="#79c0ff" marker-end="url(#a1)"/>
<line id="f8" class="flow" x1="335" y1="270" x2="415" y2="490" stroke="#d29922" marker-end="url(#a3)"/>
<line id="f9" class="flow" x1="600" y1="492" x2="825" y2="445" stroke="#d29922" marker-end="url(#a3)"/>
<line id="f10" class="flow" x1="830" y1="450" x2="340" y2="270" stroke="#3fb950" marker-end="url(#a2)"/>

<!-- Step bar -->
<g id="sbar" style="opacity:0">
  <rect class="step-bar" x="15" y="20" width="1110" height="42"/>
  <text id="sn" class="step-n" x="30" y="47"></text>
  <text id="st" class="step-t" x="75" y="47"></text>
</g>
</svg>
</div>

<div class="controls">
  <button class="go" id="bp" onclick="autoPlay()">Auto Play</button>
  <button class="go" id="bn" onclick="next()">Next Step &rarr;</button>
  <button onclick="reset()">Reset</button>
  <span id="info"></span>
</div>

<div id="log"><div id="lc"></div></div>

<script>
const pods = ['pod-diagnose','pod-fix','pod-verify'];
const S = [
  {n:'1/8', t:'User triggers workflow: POST /v1/workflows/run',
   on:['f1'], log:'<span class="ls">→ POST /v1/workflows/run</span> {workflow: "diagnose-and-fix"}'},

  {n:'2/8', t:'Executor loads workflow.yaml, resolves diagnostic-agent from registry',
   on:['f2'], log:'<span class="ls">→ Load workflow.yaml</span>\n  steps: diagnose → approve → fix → verify\n  all steps use: diagnostic-agent'},

  {n:'3/8', t:'Step "diagnose": Spawner creates ephemeral diagnostic-agent pod → agent investigates cluster',
   on:['f3','f4','f5'], show:['pod-diagnose'],
   log:'<span class="ld">↑ spawn</span> Job: diagnostic-agent-a1b2\n  image: agent-runtime:latest\n  mounts: agent.yaml, diagnostic_tools.py, registry.yaml\n<span class="ld">⚙ LLM → tools:</span> list_hosts() → check_host("web-02") → get_alerts() → get_recent_deploys()\n<span class="ld">← DiagnosticReport</span> {summary:"web-02 degraded after deploy v2.3.1", issues_found:2, confidence:"high"}'},

  {n:'4/8', t:'DiagnosticReport returned → ephemeral pod DESTROYED',
   on:['f6'], hide:['pod-diagnose'],
   log:'<span class="ld">↓ destroy</span> diagnostic-agent-a1b2 — Job+Service deleted\n<span class="ls">✓ Step "diagnose" completed</span>'},

  {n:'5/8', t:'Step "approve": Workflow PAUSES → Slack notification → human reviews diagnosis + approves',
   on:['f8','f9','f10'],
   log:'<span class="lw">⏸ Workflow paused</span> at step "approve"\n<span class="lw">→ Slack #sre-approvals:</span> "2 issues found on web-02. Approve remediation?"\n  Approver sees: DiagnosticReport, risk_level, rollback_plan\n<span class="ld">← Approved</span> by sre-lead@redhat.com (45s)'},

  {n:'6/8', t:'Step "fix": NEW ephemeral diagnostic-agent pod → agent remediates → pod DESTROYED',
   on:['f3','f4','f5'], show:['pod-fix'],
   log:'<span class="ld">↑ spawn</span> Job: diagnostic-agent-d4e5 (new pod, clean state)\n  same image, same mounts, different pod ID\n<span class="ld">⚙ LLM → tools:</span> run_remediation("web-02","rollback_deploy:frontend","bad deploy") → run_remediation("web-02","restart_service:app","post-rollback")\n<span class="ld">← DiagnosticReport</span> {actions_taken:2, cluster_healthy:true}'},

  {n:'6b', t:'Fix result returned → ephemeral pod DESTROYED',
   on:['f6'], hide:['pod-fix'],
   log:'<span class="ld">↓ destroy</span> diagnostic-agent-d4e5\n<span class="ls">✓ Step "fix" completed</span>'},

  {n:'7/8', t:'Step "verify": ANOTHER ephemeral diagnostic-agent pod → independently confirms fix worked',
   on:['f3','f4','f5'], show:['pod-verify'],
   log:'<span class="ld">↑ spawn</span> Job: diagnostic-agent-g7h8 (third pod, clean state)\n  same image, same mounts — independent verification\n<span class="ld">⚙ LLM → tools:</span> list_hosts() → check_host("web-02") → check_host("web-01")\n<span class="ld">← DiagnosticReport</span> {cluster_healthy:true, issues_found:0, remaining_issues:[]}'},

  {n:'8/8', t:'Verification passed → pod DESTROYED → workflow COMPLETE → state persisted',
   on:['f6','f7'], hide:['pod-verify'],
   log:'<span class="ld">↓ destroy</span> diagnostic-agent-g7h8\n<span class="ls">✓ Step "verify" completed</span>\n<span class="ls">✓ Workflow "diagnose-and-fix" COMPLETED</span>\n<span class="ld">→ State persisted</span> to PostgreSQL\n\n  3 ephemeral pods created and destroyed. Zero long-running agent pods.'},
];

let ci=0, tm=null, mode='idle';

function off(){document.querySelectorAll('.flow').forEach(l=>l.classList.remove('on'));}

function step(i){
  if(i>=S.length){off();$('info').textContent='Done';$('bn').disabled=true;return;}
  const s=S[i];
  $('sbar').style.opacity=1;
  $('sn').textContent='Step '+s.n;
  $('st').textContent=s.t;
  off();
  (s.on||[]).forEach(id=>{const e=$(id);if(e)e.classList.add('on');});
  (s.show||[]).forEach(id=>{const e=$(id);if(e){e.style.opacity=1;e.style.transition='opacity 0.4s';}});
  (s.hide||[]).forEach(id=>{const e=$(id);if(e){e.style.opacity=0;e.style.transition='opacity 0.6s';}});
  const lc=$('lc'); lc.innerHTML+=s.log+'\n'; lc.scrollTop=lc.scrollHeight;
}

function $(id){return document.getElementById(id);}

function autoPlay(){
  reset(); mode='auto'; ci=0;
  $('info').textContent='Auto playing...'; $('bn').disabled=true;
  (function go(){
    if(ci>=S.length||mode!=='auto'){if(ci>=S.length){off();$('info').textContent='Done';}return;}
    step(ci); ci++;
    tm=setTimeout(go, ci<=2?2000:ci===5?3500:2500);
  })();
}

function next(){
  if(mode==='auto')return;
  if(mode==='idle'){reset();mode='manual';}
  if(ci>=S.length)return;
  step(ci); ci++;
  $('info').textContent=ci>=S.length?'Done':`${ci}/${S.length} — click Next Step`;
  if(ci>=S.length)$('bn').disabled=true;
}

function reset(){
  if(tm)clearTimeout(tm); mode='idle'; ci=0; off();
  $('sbar').style.opacity=0;
  pods.forEach(id=>{$(id).style.opacity=0;});
  $('lc').innerHTML=''; $('info').textContent=''; $('bn').disabled=false;
}
</script>
</body>
</html>
