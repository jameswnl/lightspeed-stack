apiVersion: v1
kind: AgentWorkflow
metadata:
  name: diagnose-and-fix
spec:
  steps:
    - name: diagnose
      type: agent
      agent: diagnostic-agent
      prompt: "Check all hosts for issues. Report what you find."
      output_key: diagnosis
      spawn: pre-deployed

    - name: approve-fix
      type: human-approval
      message: "Review the diagnosis and approve remediation."
      output_key: approval

    - name: fix
      type: agent
      agent: diagnostic-agent
      prompt: "Fix all issues found in the diagnosis."
      output_key: fix
      spawn: pre-deployed
      condition: "steps.approval.output.approved == true"

    - name: verify
      type: agent
      agent: monitoring-agent
      prompt: "Verify the cluster is healthy after remediation."
      output_key: verification
      spawn: pre-deployed
      condition: "steps.fix.status == completed"
